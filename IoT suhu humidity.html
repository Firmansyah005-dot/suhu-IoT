<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Suhu & Kelembapan - ThingSpeak</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 1000px;
            width: 100%;
        }
        h1 {
            margin-top: 0;
            color: #2c3e50;
            font-size: 24px;
            margin-bottom: 30px;
        }
        .cards {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .card {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            padding: 20px;
            width: 150px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card-icon {
            font-size: 40px;
            margin-bottom: 15px;
        }
        .card-title {
            font-size: 16px;
            color: #7f8c8d;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .card-value {
            font-size: 32px;
            font-weight: bold;
            color: #2980b9;
        }
        .temp-color { color: #e74c3c; }
        .hum-color { color: #3498db; }
        
        .status {
            margin-top: 20px;
            margin-bottom: 30px;
            font-size: 12px;
            color: #95a5a6;
        }

        /* Styling untuk container grafik */
        .charts-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        .chart-box {
            border: 1px solid #cccccc;
            border-radius: 8px;
            overflow: hidden;
            background-color: #fff;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Dashboard Sensor Real-time</h1>
        
        <div class="cards">
            <div class="card">
                <div class="card-icon">🌡️</div>
                <div class="card-title">Suhu</div>
                <div class="card-value temp-color" id="suhuValue">-- °C</div>
            </div>

            <div class="card">
                <div class="card-icon">💧</div>
                <div class="card-title">Kelembapan</div>
                <div class="card-value hum-color" id="humValue">-- %</div>
            </div>
        </div>

        <div class="status" id="lastUpdate">Mengambil data...</div>

        <div class="charts-container">
            <div class="chart-box">
                <iframe width="450" height="260" style="border: none;" 
                        src="https://thingspeak.com/channels/3296473/charts/1?bgcolor=%23ffffff&color=%23d62020&dynamic=true&results=60&type=line&update=15">
                </iframe>
            </div>

            <div class="chart-box">
                <iframe width="450" height="260" style="border: none;" 
                        src="https://thingspeak.com/channels/3296473/charts/2?bgcolor=%23ffffff&color=%23d62020&dynamic=true&results=60&type=line&update=15">
                </iframe>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // KONFIGURASI THINGSPEAK
        // ==========================================
        const CHANNEL_ID = '3296473'; // Channel ID Anda
        const READ_API_KEY = 'Z31LIHBK5Q4G0G8H'; // Read API Key Anda
        
        async function fetchThingSpeakData() {
            const url = `https://api.thingspeak.com/channels/${CHANNEL_ID}/feeds/last.json?api_key=${READ_API_KEY}`;

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('Gagal terhubung ke ThingSpeak');
                
                const data = await response.json();

                const suhu = data.field1; 
                const kelembapan = data.field2; 
                
                document.getElementById('suhuValue').innerText = suhu ? `${suhu} °C` : '-- °C';
                document.getElementById('humValue').innerText = kelembapan ? `${kelembapan} %` : '-- %';
                
                const date = new Date(data.created_at);
                document.getElementById('lastUpdate').innerText = `Update terakhir: ${date.toLocaleTimeString('id-ID')}`;

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('lastUpdate').innerText = 'Gagal mengambil data. Periksa ID/API Key.';
            }
        }

        fetchThingSpeakData();
        setInterval(fetchThingSpeakData, 15000);
    </script>

</body>
</html>
